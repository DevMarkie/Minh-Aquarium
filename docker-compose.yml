
services:
  mysql:
    image: mysql:8.0
    container_name: minh_aquarium_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: minh123
      MYSQL_DATABASE: minh_aquarium
      MYSQL_USER: minh_user
      MYSQL_PASSWORD: minh123
    ports:
      - "3307:3306"
    volumes:
      - ./db/database.sql:/docker-entrypoint-initdb.d/database.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
