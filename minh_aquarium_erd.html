
<style>
h2.sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }
#erd { width:100%; overflow-x:auto; }
#erd svg { min-width: 900px; }
.legend { display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px;padding:0 4px; }
.leg-item { display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary); }
.leg-dot { width:10px;height:10px;border-radius:2px; }
</style>
<h2 class="sr-only">Sơ đồ ERD cơ sở dữ liệu website Minh Aquarium, gồm các nhóm bảng: người dùng, sản phẩm, đơn hàng, blog, dịch vụ setup và chat.</h2>
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>Người dùng</div>
  <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>Sản phẩm & Danh mục</div>
  <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>Đơn hàng & Giỏ hàng</div>
  <div class="leg-item"><div class="leg-dot" style="background:#185FA5"></div>Blog</div>
  <div class="leg-item"><div class="leg-dot" style="background:#993C1D"></div>Dịch vụ Setup</div>
  <div class="leg-item"><div class="leg-dot" style="background:#3B6D11"></div>Chat & Hỗ trợ</div>
</div>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#AFA9EC' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryBorderColor: dark ? '#5DCAA5' : '#0F6E56',
    tertiaryColor: dark ? '#633806' : '#FAEEDA',
    tertiaryBorderColor: dark ? '#EF9F27' : '#BA7517',
  },
});

const diagram = `erDiagram
  USERS {
    int id PK
    string full_name
    string email
    string password_hash
    string phone
    string address
    enum role "customer|staff|admin"
    timestamp created_at
  }

  CATEGORIES {
    int id PK
    int parent_id FK
    string name
    string slug
    string description
    string image_url
    int sort_order
  }

  PRODUCTS {
    int id PK
    int category_id FK
    string name
    string slug
    text description
    decimal price
    decimal sale_price
    int stock_quantity
    boolean is_active
    boolean is_featured
    timestamp created_at
  }

  PRODUCT_IMAGES {
    int id PK
    int product_id FK
    string image_url
    boolean is_primary
    int sort_order
  }

  PRODUCT_SPECS {
    int id PK
    int product_id FK
    string spec_key
    string spec_value
  }

  REVIEWS {
    int id PK
    int product_id FK
    int user_id FK
    int rating
    text comment
    timestamp created_at
  }

  CARTS {
    int id PK
    int user_id FK
    timestamp updated_at
  }

  CART_ITEMS {
    int id PK
    int cart_id FK
    int product_id FK
    int quantity
  }

  ORDERS {
    int id PK
    int user_id FK
    string order_code
    decimal subtotal
    decimal shipping_fee
    decimal total_amount
    string recipient_name
    string recipient_phone
    string shipping_address
    enum payment_method "cod|bank_transfer"
    enum payment_status "pending|paid"
    enum order_status "pending|confirmed|shipping|completed|cancelled"
    boolean is_express_ship
    text note
    timestamp created_at
  }

  ORDER_ITEMS {
    int id PK
    int order_id FK
    int product_id FK
    int quantity
    decimal unit_price
    string product_name
  }

  SETUP_REQUESTS {
    int id PK
    int user_id FK
    string full_name
    string phone
    string email
    string tank_size
    enum tank_style "natural|dutch|iwagumi|biotope|other"
    text description
    string image_url
    enum status "new|consulting|quoted|completed|cancelled"
    text admin_note
    timestamp created_at
  }

  BLOG_CATEGORIES {
    int id PK
    string name
    string slug
  }

  BLOG_POSTS {
    int id PK
    int blog_category_id FK
    int author_id FK
    string title
    string slug
    text content
    string thumbnail_url
    boolean is_published
    timestamp published_at
    timestamp created_at
  }

  CHAT_SESSIONS {
    int id PK
    int user_id FK
    int staff_id FK
    enum status "open|closed"
    timestamp created_at
  }

  CHAT_MESSAGES {
    int id PK
    int session_id FK
    int sender_id FK
    text content
    boolean is_read
    timestamp sent_at
  }

  USERS ||--o{ ORDERS : "places"
  USERS ||--o{ REVIEWS : "writes"
  USERS ||--o{ CARTS : "has"
  USERS ||--o{ SETUP_REQUESTS : "submits"
  USERS ||--o{ BLOG_POSTS : "authors"
  USERS ||--o{ CHAT_SESSIONS : "opens"
  USERS ||--o{ CHAT_MESSAGES : "sends"

  CATEGORIES ||--o{ CATEGORIES : "parent of"
  CATEGORIES ||--o{ PRODUCTS : "contains"

  PRODUCTS ||--o{ PRODUCT_IMAGES : "has"
  PRODUCTS ||--o{ PRODUCT_SPECS : "has"
  PRODUCTS ||--o{ REVIEWS : "receives"
  PRODUCTS ||--o{ CART_ITEMS : "in"
  PRODUCTS ||--o{ ORDER_ITEMS : "in"

  CARTS ||--o{ CART_ITEMS : "contains"
  ORDERS ||--o{ ORDER_ITEMS : "contains"

  BLOG_CATEGORIES ||--o{ BLOG_POSTS : "groups"
  CHAT_SESSIONS ||--o{ CHAT_MESSAGES : "contains"
`;

const { svg } = await mermaid.render('erd-main', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]];
  const ys = [nums[1],nums[3],nums[5],nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs)-x, h = Math.max(...ys)-y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
